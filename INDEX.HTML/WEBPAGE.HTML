<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>My Responsive Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
    }

    .box {
      flex: 1 1 300px;
      margin: 10px;
      padding: 20px;
      background: lightblue;
      text-align: center;
    }

    /* Mobile styles */
    @media (max-width: 600px) {
      header {
        font-size: 18px;
      }

      .box {
        background: lightgreen;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>My Website</h1>
</header>

<div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
</div>

</body>
</html>
